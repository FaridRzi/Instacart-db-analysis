models:
  - name: stg_instacart__products
    description: "Staging model for products data"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        data_tests:
          - not_null
          - unique
      - name: product_name
        description: "Name of the product"
      - name: aisle_id
        description: "Foreign key to the aisle the product belongs to"
        data_tests:
          - relationships:
              to: ref('stg_instacart__aisles')
              field: aisle_id
      - name: department_id
        description: "Foreign key to the department the product belongs to"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_instacart__departments')
              field: department_id
  - name: stg_instacart__order_products
    description: "Staging model for order products data, combining prior and train datasets"
    columns:
      - name: order_product_id
        description: "Surrogate key for the order-product combination"
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: "Unique identifier for each order"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_instacart__orders')
              field: order_id
      - name: product_id
        description: "Unique identifier for each product in the order"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_instacart__products')
              field: product_id
      - name: add_to_cart_order
        description: "The order in which the products were added to the cart"
      - name: reordered
        description: "Flag indicating if the product was reordered (1) or not (0)"
  - name: stg_instacart__orders
    description: "Staging model for orders data"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        data_tests:
          - not_null
          - unique
      - name: user_id
        description: "Unique identifier for each user who placed the order"
        data_tests:
          - not_null
      - name: eval_set
        description: "Indicates whether the order is in the 'prior', 'train', or 'test' set"
      - name: order_number
        description: "The order number for the user (1 for the first order, 2 for the second, etc.)"
      - name: order_dow
        description: "The day of the week the order was placed (0 = Sunday, 1 = Monday, ..., 6 = Saturday)"
      - name: order_hour_of_day
        description: "The hour of the day the order was placed (0-23)"
      - name: days_since_prior_order
        description: "The number of days since the user's previous order (null for the first order)"
  - name: stg_instacart__aisles
    description: "Staging model for aisles data"
    columns:
      - name: aisle_id
        description: "Unique identifier for each aisle"
        data_tests:
          - not_null
          - unique
      - name: aisle_name
        description: "Name of the aisle"
  - name: stg_instacart__departments
    description: "Staging model for departments data"
    columns:
      - name: department_id
        description: "Unique identifier for each department"
        data_tests:
          - not_null
          - unique
      - name: department_name
        description: "Name of the department"